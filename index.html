<!DOCTYPE html>
<html lang="en">r
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>Peak Power Washing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Reset ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f7;
      color: rgba(0, 0, 0, 0.933);
      min-height: 100%;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Variables ─────────────────────────────── */
    :root {
      --white:   #ffffff;
      --g50:     #f9f9f9;
      --g100:    #f5f5f7;
      --g200:    #e5e5ea;
      --g300:    #d1d1d6;
      --g400:    #aeaeb2;
      --g500:    #8e8e93;
      --g600:    #636366;
      --g700:    #3a3a3c;
      --g800:    #2c2c2e;
      --g900:    #1c1c1e;
      --black:   #000000;
      --green:   #000000;
      --orange:  #ff9500;
      --red:     #ff3b30;
      --blue:    #007aff;
      --r-sm:    8px;
      --r-md:    12px;
      --r-lg:    16px;
      --r-xl:    20px;
      --shadow:  0 1px 4px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      --header:  56px;
      --nav:     80px;
    }

    /* ── Header ────────────────────────────────── */
    .header {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      height: var(--header);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--g200);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-mark {
      width: 30px; height: 30px;
      background: var(--black); border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 900; font-size: 15px; letter-spacing: -0.5px;
    }
    .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.4px; }
    .header-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--g100); border: none; cursor: pointer;
      font-size: 20px; display: flex; align-items: center; justify-content: center;
      font-weight: 300; color: var(--g700);
      transition: opacity .15s;
    }
    .header-btn:active { opacity: .5; }

    /* ── Main ──────────────────────────────────── */
    .main {
      padding-top: calc(var(--header) + 12px);
      padding-bottom: calc(var(--nav) + 12px);
    }

    /* ── Bottom Nav ────────────────────────────── */
    .nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      height: var(--nav);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--g200);
      display: flex; align-items: flex-start; padding-top: 6px;
      z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
      padding: 6px 4px; background: none; border: none; cursor: pointer;
      transition: opacity .15s; text-decoration: none;
    }
    .nav-btn:active { opacity: .5; }
    .nav-icon { font-size: 22px; line-height: 1; filter: grayscale(1) opacity(.4); transition: filter .15s; }
    .nav-label { font-size: 10px; font-weight: 500; color: var(--g400); letter-spacing: .1px; }
    .nav-icon-wrap {
      width: 34px; height: 34px; border-radius: 50%; overflow: hidden;
      background: #060d1a; margin: 0 auto; flex-shrink: 0;
      transition: box-shadow .2s; opacity: 0.72;
    }
    .nav-icon-wrap.light {
      background: transparent;
    }
    .nav-icon-wrap.light img {
      mix-blend-mode: multiply;
    }
    .nav-btn img {
      width: 34px; height: 34px; display: block; object-fit: cover;
    }
    .nav-btn.active .nav-icon-wrap {
      box-shadow: 0 0 0 2px #1e6fff, 0 0 10px rgba(30,111,255,0.5);
      opacity: 1;
    }
    .nav-btn.active .nav-icon-wrap.light {
      box-shadow: none;
      filter: drop-shadow(0 0 6px rgba(30,111,255,0.6));
    }
    .nav-btn.active .nav-label { color: #1e6fff; font-weight: 700; }

    /* FAB */
    .nav-fab {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer; margin-top: -10px; padding: 0 4px;
    }
    .nav-fab-ring {
      width: 50px; height: 50px; border-radius: 50%;
      background: var(--black);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.28);
      transition: transform .15s, box-shadow .15s;
    }
    .nav-fab:active .nav-fab-ring { transform: scale(.88); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    @keyframes fabPop { 0%{transform:scale(1)} 40%{transform:scale(.88)} 70%{transform:scale(1.08)} 100%{transform:scale(1)} }
    .nav-fab-ring.popping { animation: fabPop .28s cubic-bezier(.2,1,.3,1) forwards; }
    .nav-fab-label { font-size: 10px; font-weight: 700; color: var(--black); }

    /* ── Cards ─────────────────────────────────── */
    .card {
      background: var(--white); border-radius: var(--r-xl);
      padding: 18px 16px; margin: 0 16px 10px;
      box-shadow: var(--shadow);
    }

    /* ── Hero stat ─────────────────────────────── */
    .hero {
      background: var(--black); border-radius: var(--r-xl);
      padding: 22px 18px; margin: 0 16px 10px;
    }
    .hero-lbl  { font-size: 12px; font-weight: 500; color: rgba(255,255,255,.55); margin-bottom: 4px; }
    .hero-val  { font-size: 42px; font-weight: 800; letter-spacing: -1.5px; color: #fff; line-height: 1; }
    .hero-sub  { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 6px; }

    /* ── Stat grid ─────────────────────────────── */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; margin-bottom: 10px; }
    .stat-card { background: var(--white); border-radius: var(--r-lg); padding: 14px; box-shadow: var(--shadow); }
    .stat-lbl  { font-size: 11px; font-weight: 500; color: var(--g500); margin-bottom: 3px; }
    .stat-val  { font-size: 22px; font-weight: 800; letter-spacing: -.7px; }
    .stat-sub  { font-size: 11px; color: var(--g400); margin-top: 2px; }

    /* ── Section header ────────────────────────── */
    .sec-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; margin: 4px 0 8px;
    }
    .sec-title { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
    .sec-link  { font-size: 13px; color: var(--g400); background: none; border: none; cursor: pointer; }

    /* ── Page title ────────────────────────────── */
    .page-title { font-size: 28px; font-weight: 800; letter-spacing: -.8px; padding: 4px 16px 8px; }

    /* ── Search ────────────────────────────────── */
    .search-wrap { margin: 0 16px 10px; position: relative; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--g400); pointer-events: none; }
    .search-input {
      width: 100%; padding: 9px 12px 9px 32px;
      background: var(--g200); border: none; border-radius: var(--r-md);
      font-size: 15px; font-family: inherit; outline: none;
      -webkit-appearance: none; color: var(--g900);
    }

    /* ── Filter tabs ───────────────────────────── */
    .tabs { display: flex; gap: 6px; padding: 0 16px; margin-bottom: 10px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 600;
      white-space: nowrap; cursor: pointer; border: none;
      background: var(--g200); color: var(--g600); transition: all .15s;
    }
    .tab.active { background: var(--black); color: white; }
    .tab:active { opacity: .7; }

    /* ── Job card ──────────────────────────────── */
    .job-card {
      position: relative; border-radius: var(--r-xl); margin: 0 16px 10px;
      box-shadow: var(--shadow); overflow: hidden;
    }
    /* Swipe-reveal backgrounds (sit behind .swipe-inner) */
    .swipe-bg-right, .swipe-bg-left {
      position: absolute; inset: 0;
      display: flex; align-items: center;
      font-size: 15px; font-weight: 700;
      opacity: 0; pointer-events: none;
    }
    .swipe-bg-right { background: var(--black); color: #fff; padding-left: 22px; }
    .swipe-bg-left  { background: var(--red);   color: #fff; padding-right: 22px; justify-content: flex-end; }
    /* Content layer that slides */
    .swipe-inner { background: var(--white); position: relative; will-change: transform; }
    .jc-head { padding: 14px 16px 8px; display: flex; align-items: flex-start; justify-content: space-between; }
    .jc-name { font-size: 15px; font-weight: 700; margin-bottom: 1px; }
    .jc-svc  { font-size: 13px; color: var(--g500); }
    .jc-right { text-align: right; }
    .jc-price{ font-size: 17px; font-weight: 800; letter-spacing: -.5px; }
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 700;
      margin-top: 3px;
    }
    .b-scheduled { background: #f0f0f0; color: #000; }
    .b-completed  { background: #e0e8ff; color: #000; }
    .b-paid       { background: #e8e8e8; color: #000; }
    .jc-meta { padding: 0 16px 10px; display: flex; flex-wrap: wrap; gap: 8px; }
    .jc-meta-item { display: flex; align-items: center; gap: 3px; font-size: 12px; color: var(--g500); text-decoration: none; }
    .jc-actions {
      border-top: 1px solid var(--g100); padding: 10px 14px;
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }

    /* ── Client card ───────────────────────────── */
    .client-card {
      background: var(--white); border-radius: var(--r-xl);
      margin: 0 16px 10px; box-shadow: var(--shadow); overflow: hidden;
    }
    .cc-head  { padding: 16px 16px 12px; display: flex; align-items: center; gap: 12px; }
    .cc-avatar {
      width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
      background: var(--black); color: #fff;
      font-size: 15px; font-weight: 800; letter-spacing: -.5px;
      display: flex; align-items: center; justify-content: center;
    }
    .cc-name  { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .cc-stats { font-size: 12px; color: var(--g500); line-height: 1.5; }
    .cc-detail {
      border-top: 1px solid var(--g100); padding: 10px 16px;
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .cc-detail-item { display: flex; align-items: center; gap: 3px; font-size: 12px; color: var(--g500); text-decoration: none; }
    .cc-actions { padding: 10px 14px 14px; }

    /* ── Buttons ───────────────────────────────── */
    .btn {
      padding: 7px 14px; border-radius: var(--r-sm);
      font-size: 13px; font-weight: 600; border: none; cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { opacity: .65; transform: scale(.96); }
    .btn-dark    { background: var(--black); color: white; }
    .btn-light   { background: var(--g100); color: var(--g700); }
    .btn-green   { background: var(--black); color: white; }
    .btn-danger  { background: none; color: var(--red); border: none; font-size: 13px; font-weight: 600; cursor: pointer; margin-left: auto; padding: 7px 4px; }
    .btn-danger:active { opacity: .6; }
    .btn-full    { width: 100%; padding: 14px; font-size: 16px; border-radius: var(--r-md); }

    /* ── Chart ─────────────────────────────────── */
    .chart-wrap { height: 180px; position: relative; }
    .chart-wrap-lg { height: 200px; position: relative; }

    /* ── Calendar ──────────────────────────────── */
    .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .week-nav-btn {
      width: 30px; height: 30px; border-radius: 50%; background: var(--g100);
      border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
      transition: opacity .15s;
    }
    .week-nav-btn:active { opacity: .5; }
    .week-nav-info { text-align: center; }
    .week-nav-label { font-size: 15px; font-weight: 700; }
    .week-nav-sub   { font-size: 11px; color: var(--g400); margin-top: 2px; }
    .week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
    .wd { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 0; border-radius: var(--r-sm); transition: background .15s; }
    .wd:active { background: var(--g100); }
    .wd-lbl { font-size: 10px; font-weight: 500; color: var(--g400); text-transform: uppercase; }
    .wd-num { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; }
    .wd-num.today { background: var(--black); color: white; font-weight: 700; }
    .wd-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--black); }
    .wd-dot-empty { width: 4px; height: 4px; }
    .cal-day-hd { font-size: 13px; font-weight: 700; color: var(--g500); margin: 12px 16px 6px; text-transform: uppercase; letter-spacing: .4px; }

    /* ── Revenue bars ──────────────────────────── */
    .svc-row { margin-bottom: 14px; }
    .svc-row-hd { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .svc-name  { font-size: 14px; font-weight: 600; }
    .svc-amt   { font-size: 14px; font-weight: 700; }
    .svc-bar   { height: 6px; background: var(--g100); border-radius: 3px; overflow: hidden; }
    .svc-fill  { height: 100%; background: var(--black); border-radius: 3px; }
    .svc-pct   { font-size: 11px; color: var(--g400); margin-top: 3px; }

    /* ── Empty state ───────────────────────────── */
    .empty { text-align: center; padding: 48px 20px; color: var(--g400); }
    .empty-icon { font-size: 44px; margin-bottom: 10px; }
    .empty-text { font-size: 15px; font-weight: 500; }

    /* ── Sheet ─────────────────────────────────── */
    .sheet-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 200;
      display: flex; align-items: flex-end; pointer-events: none;
      transition: background .18s;
    }
    .sheet-overlay.open { background: rgba(0,0,0,.45); pointer-events: auto; }
    .sheet {
      width: 100%; max-width: 430px; margin: 0 auto;
      background: var(--white); border-radius: 24px 24px 0 0;
      max-height: 92dvh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform .22s cubic-bezier(.2,1,.3,1);
    }
    .sheet-overlay.open .sheet { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: rgba(255,255,255,.35); border-radius: 2px; margin: 10px auto 8px; }
    .sheet-hd {
      padding: 0 16px 12px;
      display: flex; flex-direction: column;
      background: linear-gradient(135deg,#1a1a2e 0%,#0055cc 100%);
      border-radius: 24px 24px 0 0;
    }
    .sheet-title { font-size: 16px; font-weight: 700; color: #fff; }
    .sheet-close {
      width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,.2); border: none;
      font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #fff; transition: opacity .15s;
    }
    .sheet-close:active { opacity: .5; }
    .sheet-body { padding: 18px; }

    /* ── Form ──────────────────────────────────── */
    .form-group { margin-bottom: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-lbl { display: block; font-size: 12px; font-weight: 600; color: var(--g600); margin-bottom: 5px; letter-spacing: .1px; }
    .form-ctrl {
      width: 100%; padding: 11px 13px; border: 1.5px solid var(--g200);
      border-radius: var(--r-md); font-size: 15px; font-family: inherit;
      color: var(--g900); background: var(--white); outline: none;
      transition: border-color .15s; -webkit-appearance: none; appearance: none;
    }
    .form-ctrl:focus { border-color: var(--black); }
    textarea.form-ctrl { resize: none; }

    /* ── Monthly Calendar ──────────────────────── */
    .cal-month-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .cal-month-label { font-size:18px; font-weight:700; letter-spacing:-.4px; }
    .cal-dow-row { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
    .cal-dow-cell { text-align:center; font-size:11px; font-weight:600; color:var(--g400); padding:4px 0; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; }
    .cal-cell {
      min-height:54px; display:flex; flex-direction:column; align-items:center;
      gap:3px; padding:4px 1px; cursor:pointer; border-radius:var(--r-sm);
      transition:background .1s;
    }
    .cal-cell:active { background:var(--g100); }
    .cal-cell.other-month { opacity:.3; }
    .cal-cell-num {
      width:28px; height:28px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:500;
    }
    .cal-cell.is-today .cal-cell-num      { background:var(--black); color:white; font-weight:800; }
    .cal-cell.is-selected:not(.is-today) .cal-cell-num { background:var(--g200); font-weight:700; }
    .cal-dots { display:flex; gap:3px; justify-content:center; }
    .cal-dot { width:5px; height:5px; border-radius:50%; }
    .cal-dot-scheduled { background:#f0a500; }
    .cal-dot-completed { background:#007aff; }
    .cal-dot-paid      { background:#000000; }
    .cal-divider { height:1px; background:var(--g200); margin:10px 16px; }
    .cal-day-hd {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 16px; margin-bottom:8px;
    }
    .cal-day-title { font-size:16px; font-weight:700; letter-spacing:-.3px; }

    /* ── Animations ────────────────────────────── */
    /* ── Service chips ─────────────────────────── */
    .svc-chip {
      padding: 6px 13px; border-radius: 100px; font-size: 13px; font-weight: 500;
      border: 1.5px solid var(--g200); background: var(--g100); color: var(--g600);
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .svc-chip.active {
      background: linear-gradient(135deg,#1a1a2e 0%,#0055cc 100%);
      border-color: transparent; color: #fff; font-weight: 600;
    }
    .svc-chip:active { opacity: .7; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeUp .2s ease-out both; }
    @keyframes btnPop {
      0%   { transform: scale(1); }
      35%  { transform: scale(.94); }
      65%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    #form-btn:active { animation: btnPop .22s cubic-bezier(.2,1,.3,1) forwards; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);">
      <img src="/assets/Peak!!!!.png" alt="Peak" onclick="location.reload()" style="height:42px;width:auto;object-fit:contain;display:block;cursor:pointer;">
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
      <span id="ws-dot" style="width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;transition:background .3s;" title="Sync status"></span>
      <button class="header-btn" id="hdr-add" aria-label="Add job">+</button>
    </div>
  </header>

  <!-- Main -->
  <main class="main" id="app"></main>

  <!-- Bottom Nav -->
  <nav class="nav">
    <button class="nav-btn active" id="nav-dashboard">
      <div class="nav-icon-wrap"><img src="/assets/dashboard.png" style="object-position:center center;"></div>
      <span class="nav-label">Dashboard</span>
    </button>
    <button class="nav-btn" id="nav-jobs">
      <div class="nav-icon-wrap"><img src="/assets/job.png" style="object-position:center center;"></div>
      <span class="nav-label">Jobs</span>
    </button>
    <button class="nav-fab" id="nav-add">
      <div class="nav-fab-ring" style="background:none;box-shadow:none;">
        <img src="/assets/Addlogo.png" style="width:50px;height:50px;border-radius:50%;object-fit:cover;display:block;">
      </div>
      <span class="nav-fab-label">Add</span>
    </button>
    <button class="nav-btn" id="nav-calendar">
      <div class="nav-icon-wrap"><img src="/assets/calendar_no_clock.png" style="object-position:center center;"></div>
      <span class="nav-label">Calendar</span>
    </button>
    <button class="nav-btn" id="nav-sales">
      <div class="nav-icon-wrap"><img src="/assets/growth_chart.png" style="object-position:right bottom;"></div>
      <span class="nav-label">Sales</span>
    </button>
  </nav>

  <!-- Add/Edit Sheet -->
  <div class="sheet-overlay" id="sheet-overlay">
    <div class="sheet" id="sheet">
      <div class="sheet-hd">
        <div class="sheet-handle" style="margin-top:10px;margin-bottom:10px;"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:2px;">
          <span class="sheet-title" id="sheet-title">New Job</span>
          <button class="sheet-close" id="sheet-close" aria-label="Close">✕</button>
        </div>
      </div>
      <div class="sheet-body">
        <form id="job-form" autocomplete="off">
          <input type="hidden" id="f-id">
          <div class="form-row">
            <div class="form-group">
              <label class="form-lbl" for="f-customer">Customer Name *</label>
              <input class="form-ctrl" type="text" id="f-customer" placeholder="Full name" autocomplete="name" inputmode="text">
            </div>
            <div class="form-group">
              <label class="form-lbl" for="f-phone">Phone *</label>
              <input class="form-ctrl" type="tel" id="f-phone" placeholder="555-000-0000" autocomplete="tel" inputmode="tel">
            </div>
          </div>
          <div class="form-group">
            <label class="form-lbl" for="f-address">Address *</label>
            <input class="form-ctrl" type="text" id="f-address" placeholder="123 Main St" autocomplete="street-address" inputmode="text">
          </div>
          <div class="form-group">
            <label class="form-lbl">Service</label>
            <button type="button" id="svc-toggle" class="form-ctrl" style="text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
              <span id="svc-toggle-label" style="color:var(--g400);">Select services…</span>
              <span id="svc-toggle-arrow" style="font-size:11px;color:var(--g400);transition:transform .2s;">▼</span>
            </button>
            <div id="svc-dropdown" style="display:none;padding:12px;background:var(--g100);border-radius:var(--r-md);margin-top:6px;">
              <div id="svc-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
                <button type="button" class="svc-chip" data-svc="Driveway">Driveway</button>
                <button type="button" class="svc-chip" data-svc="House">House</button>
                <button type="button" class="svc-chip" data-svc="Full Wash">Full Wash</button>
                <button type="button" class="svc-chip" data-svc="Deck">Deck</button>
                <button type="button" class="svc-chip" data-svc="Fence">Fence</button>
                <button type="button" class="svc-chip" data-svc="Roof">Roof</button>
                <button type="button" class="svc-chip" data-svc="Gutter">Gutter</button>
                <button type="button" class="svc-chip" data-svc="Patio">Patio</button>
                <button type="button" class="svc-chip" data-svc="Siding">Siding</button>
              </div>
              <input class="form-ctrl" type="text" id="f-service-custom" placeholder="Or type a custom service…" autocomplete="off" inputmode="text">
            </div>
            <input type="hidden" id="f-service">
          </div>
          <div class="form-group">
            <label class="form-lbl" for="f-price">Price ($)</label>
            <input class="form-ctrl" type="number" id="f-price" placeholder="0" step="5" min="0" inputmode="decimal">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-lbl" for="f-date">Date *</label>
              <input class="form-ctrl" type="date" id="f-date">
            </div>
            <div class="form-group">
              <label class="form-lbl" for="f-time">Time</label>
              <input class="form-ctrl" type="time" id="f-time">
            </div>
          </div>
          <div class="form-group" id="status-group" style="display:none;">
            <label class="form-lbl">Status</label>
            <button type="button" id="f-status-btn" class="form-ctrl" style="text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
              <span id="f-status-label">Scheduled</span>
              <span style="font-size:11px;color:var(--g400);">▼</span>
            </button>
            <input type="hidden" id="f-status" value="scheduled">
          </div>
          <div class="form-group">
            <label class="form-lbl">Sold By</label>
            <button type="button" id="f-sold-by-btn" class="form-ctrl" style="text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
              <span id="f-sold-by-label">Peak</span>
              <span style="font-size:11px;color:var(--g400);">▼</span>
            </button>
            <input type="hidden" id="f-sold-by" value="Peak">
          </div>
          <div class="form-group">
            <label class="form-lbl" for="f-notes">Notes</label>
            <textarea class="form-ctrl" id="f-notes" rows="2" placeholder="Gate code, special instructions…"></textarea>
          </div>
          <button type="submit" class="btn btn-full" id="form-btn" style="background:linear-gradient(135deg,#1a1a2e 0%,#0055cc 100%);color:#fff;font-weight:700;letter-spacing:-.2px;">Add Job</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Status Popup -->
  <div id="status-overlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0);align-items:center;justify-content:center;transition:background .15s;">
    <div id="status-popup" style="background:#fff;border-radius:20px;width:280px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.25);transform:scale(.92);opacity:0;transition:transform .18s cubic-bezier(.2,1,.3,1),opacity .18s ease;">
      <div style="padding:16px 18px 8px;font-size:12px;font-weight:600;color:var(--g400);letter-spacing:.4px;text-transform:uppercase;">Status</div>
      <button type="button" class="status-opt" data-val="scheduled" data-lbl="Scheduled" style="width:100%;padding:14px 18px;border:none;background:none;text-align:left;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:12px;border-top:1px solid var(--g100);">
        <div style="width:10px;height:10px;border-radius:50%;background:#f0a500;flex-shrink:0;"></div>Scheduled
      </button>
      <button type="button" class="status-opt" data-val="completed" data-lbl="Completed" style="width:100%;padding:14px 18px;border:none;background:none;text-align:left;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:12px;border-top:1px solid var(--g100);">
        <div style="width:10px;height:10px;border-radius:50%;background:#007aff;flex-shrink:0;"></div>Completed
      </button>
      <button type="button" class="status-opt" data-val="paid" data-lbl="Paid ✓" style="width:100%;padding:14px 18px;border:none;background:none;text-align:left;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:12px;border-top:1px solid var(--g100);">
        <div style="width:10px;height:10px;border-radius:50%;background:#000;flex-shrink:0;"></div>Paid ✓
      </button>
    </div>
  </div>

  <!-- Sold By Popup -->
  <div id="sold-by-overlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0);align-items:center;justify-content:center;transition:background .15s;">
    <div id="sold-by-popup" style="background:#fff;border-radius:20px;width:280px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.25);transform:scale(.92);opacity:0;transition:transform .18s cubic-bezier(.2,1,.3,1),opacity .18s ease;">
      <div style="padding:16px 18px 8px;font-size:12px;font-weight:600;color:var(--g400);letter-spacing:.4px;text-transform:uppercase;">Sold By</div>
      <button type="button" class="sold-by-opt" data-val="Peak" style="width:100%;padding:14px 18px;border:none;background:none;text-align:left;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:12px;border-top:1px solid var(--g100);">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--black);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;">P</div>
        Peak
      </button>
      <button type="button" class="sold-by-opt" data-val="Caden Bouchard" style="width:100%;padding:14px 18px;border:none;background:none;text-align:left;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:12px;border-top:1px solid var(--g100);">
        <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1a1a2e 0%,#0055cc 100%);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;">CB</div>
        Caden Bouchard
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
